# ---------------------------------------------------------------------------
# Docker Compose — Predictive Cluster Manager
# ---------------------------------------------------------------------------
# Starts the FastAPI backend and mounts the host Docker socket so the API
# can create/destroy simulated cluster-node containers on the host daemon.
#
# Usage:
#   docker-compose up --build        (start)
#   docker-compose down              (stop)
# ---------------------------------------------------------------------------

services:
  api:
    build: .
    container_name: predictive-cluster-api
    ports:
      - "8000:8000"
    volumes:
      # Mount Docker socket so the API can manage containers on the host.
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
