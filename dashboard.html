<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictive Cluster Manager Dashboard</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-blue-glow: rgba(59, 130, 246, 0.5);
            --accent-emerald: #10b981;
            --accent-emerald-glow: rgba(16, 185, 129, 0.5);
            --accent-red: #ef4444;
            --accent-purple: #8b5cf6;
            --glass-blur: blur(12px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
            background-attachment: fixed;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1400px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .glass {
            background: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* --- Header --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
        }

        h1 {
            font-weight: 800;
            font-size: 1.8rem;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 0.875rem;
            font-weight: 600;
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-emerald);
            border: 1px solid rgba(16, 185, 129, 0.2);
            transition: all 0.3s ease;
        }

        .status-badge.disconnected {
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent-red);
            border-color: rgba(239, 68, 68, 0.2);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent-emerald);
            box-shadow: 0 0 10px var(--accent-emerald-glow);
            animation: pulse 2s infinite;
        }
        .disconnected .status-dot {
            background-color: var(--accent-red);
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
            animation: none;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* --- Metrics Grid --- */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .metric-card {
            padding: 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        .metric-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--accent-blue);
            border-radius: 4px 0 0 4px;
        }
        
        .metric-card:nth-child(2)::before { background: var(--accent-purple); }
        .metric-card:nth-child(3)::before { background: var(--accent-emerald); }

        .metric-card h3 {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .metric-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* --- Main Content --- */
        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
            flex: 1;
        }

        .chart-panel, .controls-panel, .nodes-panel {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .chart-panel {
            min-height: 400px;
        }

        h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .canvas-container {
            flex: 1;
            position: relative;
            width: 100%;
        }

        /* --- Controls --- */
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .btn {
            padding: 0.875rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn:active { transform: scale(0.98); }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent-red);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
        }

        .btn-primary {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-blue);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        .btn-primary:hover {
            background: rgba(59, 130, 246, 0.2);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        .btn-warning {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }
        .btn-warning:hover {
            background: rgba(245, 158, 11, 0.2);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
        }

        /* --- Nodes Grid --- */
        .nodes-panel {
            flex: 1;
        }

        .nodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 12px;
            padding: 0.5rem 0;
        }

        .node-box {
            aspect-ratio: 1;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.1) inset;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: nodePopIn 0.4s forwards;
            opacity: 0;
            transform: scale(0.5);
        }

        .node-box.removing {
            animation: nodePopOut 0.3s forwards;
        }

        @keyframes nodePopIn {
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes nodePopOut {
            to { opacity: 0; transform: scale(0.5); }
        }

        .node-icon {
            width: 24px;
            height: 24px;
            background-color: var(--accent-emerald);
            mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect><rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect><line x1="6" y1="6" x2="6.01" y2="6"></line><line x1="6" y1="18" x2="6.01" y2="18"></line></svg>') no-repeat center / contain;
            -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect><rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect><line x1="6" y1="6" x2="6.01" y2="6"></line><line x1="6" y1="18" x2="6.01" y2="18"></line></svg>') no-repeat center / contain;
        }

        .node-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--accent-emerald);
            font-weight: 700;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="dashboard-container">
        <!-- Header -->
        <header class="glass">
            <h1>Predictive Cluster Manager</h1>
            <div class="status-badge disconnected" id="apiStatus">
                <div class="status-dot"></div>
                <span>Disconnected</span>
            </div>
        </header>

        <!-- Top Metrics -->
        <div class="metrics-grid">
            <div class="metric-card glass">
                <h3>Live CPU Usage</h3>
                <div class="metric-value" id="cpuValue">0.0%</div>
            </div>
            <div class="metric-card glass">
                <h3>Live Memory Usage</h3>
                <div class="metric-value" id="memValue">0.0%</div>
            </div>
            <div class="metric-card glass">
                <h3>Active Nodes</h3>
                <div class="metric-value" id="nodesValue">0</div>
            </div>
        </div>

        <!-- Main Workspace -->
        <div class="main-content">
            
            <!-- Chart -->
            <div class="chart-panel glass">
                <h2>Real-Time Workload Metrics</h2>
                <div class="canvas-container">
                    <canvas id="workloadChart"></canvas>
                </div>
            </div>
            
            <!-- Side Panel -->
            <div class="side-panel">
                
                <!-- Controls -->
                <div class="controls-panel glass">
                    <h2>Manual Override Controls</h2>
                    <div class="btn-group">
                        <button class="btn btn-warning" onclick="triggerSpike()" id="btnSpike">
                            <span class="loading-spinner" id="spinSpike"></span>
                            Simulate 85% Traffic Spike
                        </button>
                        <button class="btn btn-primary" onclick="triggerCalm()" id="btnCalm">
                            <span class="loading-spinner" id="spinCalm"></span>
                            Simulate 15% Cooldown
                        </button>
                        <button class="btn btn-danger" onclick="triggerCleanup()" id="btnCleanup">
                            <span class="loading-spinner" id="spinCleanup"></span>
                            Destroy All Nodes
                        </button>
                    </div>
                </div>

                <!-- Node Grid -->
                <div class="nodes-panel glass">
                    <h2>Physical Cluster Nodes (<span id="nodeCountText">0</span>)</h2>
                    <div class="nodes-grid" id="nodesGrid">
                        <!-- Nodes will be injected here via JS -->
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        const API_URL = 'http://127.0.0.1:8000';
        const MAX_DATA_POINTS = 30; // 30 seconds of history if polling every 1s
        
        // DOM Elements
        const elStatus = document.getElementById('apiStatus');
        const elStatusText = elStatus.querySelector('span');
        const elCpu = document.getElementById('cpuValue');
        const elMem = document.getElementById('memValue');
        const elNodes = document.getElementById('nodesValue');
        const elNodeCountText = document.getElementById('nodeCountText');
        const elNodesGrid = document.getElementById('nodesGrid');

        // State tracking
        let activeNodesMap = new Map(); // id -> DOM element

        // Initialize Chart.js
        const ctx = document.getElementById('workloadChart').getContext('2d');
        
        // Gradient for CPU
        const gradientCpu = ctx.createLinearGradient(0, 0, 0, 400);
        gradientCpu.addColorStop(0, 'rgba(59, 130, 246, 0.5)');
        gradientCpu.addColorStop(1, 'rgba(59, 130, 246, 0.0)');

        // Gradient for Memory
        const gradientMem = ctx.createLinearGradient(0, 0, 0, 400);
        gradientMem.addColorStop(0, 'rgba(139, 92, 246, 0.5)');
        gradientMem.addColorStop(1, 'rgba(139, 92, 246, 0.0)');

        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(MAX_DATA_POINTS).fill(''),
                datasets: [
                    {
                        label: 'CPU Usage %',
                        borderColor: '#3b82f6',
                        backgroundColor: gradientCpu,
                        borderWidth: 3,
                        pointRadius: 0,
                        pointHoverRadius: 6,
                        fill: true,
                        tension: 0.4,
                        data: Array(MAX_DATA_POINTS).fill(0)
                    },
                    {
                        label: 'Memory Usage %',
                        borderColor: '#8b5cf6',
                        backgroundColor: gradientMem,
                        borderWidth: 3,
                        pointRadius: 0,
                        pointHoverRadius: 6,
                        fill: true,
                        tension: 0.4,
                        data: Array(MAX_DATA_POINTS).fill(0)
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 0 },
                plugins: {
                    legend: {
                        labels: { color: '#f8fafc', font: { family: 'Inter', size: 13 } }
                    },
                    tooltip: { mode: 'index', intersect: false }
                },
                scales: {
                    x: {
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { display: false }
                    },
                    y: {
                        min: 0, max: 100,
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: {
                            color: '#94a3b8',
                            font: { family: 'JetBrains Mono' },
                            callback: function(value) { return value + '%'; }
                        }
                    }
                }
            }
        });

        // Polling loop
        async function fetchStatus() {
            try {
                const response = await fetch(`${API_URL}/status`);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                
                // Update Connection Status
                elStatus.className = 'status-badge';
                elStatusText.textContent = 'Connected API';

                // Update Big Numbers
                const cpuPercent = (data.current_cpu * 100).toFixed(1);
                const memPercent = (data.current_memory * 100).toFixed(1);
                elCpu.textContent = `${cpuPercent}%`;
                elMem.textContent = `${memPercent}%`;
                elNodes.textContent = data.running_nodes;
                elNodeCountText.textContent = data.running_nodes;

                // Update Chart
                updateChart(parseFloat(cpuPercent), parseFloat(memPercent));

                // Update Node Visualizer
                updateNodesGrid(data.node_details);

            } catch (error) {
                console.error('Error fetching status:', error);
                elStatus.className = 'status-badge disconnected';
                elStatusText.textContent = 'Disconnected';
            }
        }

        function updateChart(cpu, mem) {
            const labels = chart.data.labels;
            const cpuData = chart.data.datasets[0].data;
            const memData = chart.data.datasets[1].data;

            labels.push('');
            labels.shift();
            
            cpuData.push(cpu);
            cpuData.shift();
            
            memData.push(mem);
            memData.shift();

            chart.update();
        }

        function updateNodesGrid(nodesFromApi) {
            const currentIds = new Set(nodesFromApi.map(n => n.name));

            // Remove deleted nodes
            for (let [id, el] of activeNodesMap.entries()) {
                if (!currentIds.has(id)) {
                    el.classList.add('removing');
                    setTimeout(() => el.remove(), 300); // Wait for animation
                    activeNodesMap.delete(id);
                }
            }

            // Add new nodes
            nodesFromApi.forEach(node => {
                if (!activeNodesMap.has(node.name)) {
                    const nodeEl = document.createElement('div');
                    nodeEl.className = 'node-box';
                    
                    // Extract just the number for display (e.g., "cluster-node-4" -> "04")
                    const numMatch = node.name.match(/\d+$/);
                    const displayNum = numMatch ? numMatch[0].padStart(2, '0') : '??';

                    nodeEl.innerHTML = `
                        <div class="node-icon"></div>
                        <div class="node-id">#${displayNum}</div>
                    `;
                    elNodesGrid.appendChild(nodeEl);
                    activeNodesMap.set(node.name, nodeEl);
                }
            });
        }

        // --- Button Controls ---
        
        async function triggerSpike() {
            setLoading('btnSpike', 'spinSpike', true);
            try {
                await fetch(`${API_URL}/simulate-stress`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cpu_spike: 0.85, memory_spike: 0.60, headroom: 1.2 })
                });
                // Immediate poll to feel responsive
                setTimeout(fetchStatus, 500); 
            } catch (e) {
                console.error(e);
            } finally {
                setLoading('btnSpike', 'spinSpike', false);
            }
        }

        async function triggerCalm() {
            setLoading('btnCalm', 'spinCalm', true);
            try {
                await fetch(`${API_URL}/simulate-stress`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cpu_spike: 0.15, memory_spike: 0.10, headroom: 1.2 })
                });
                setTimeout(fetchStatus, 500);
            } catch (e) {
                console.error(e);
            } finally {
                setLoading('btnCalm', 'spinCalm', false);
            }
        }

        async function triggerCleanup() {
            setLoading('btnCleanup', 'spinCleanup', true);
            try {
                await fetch(`${API_URL}/cleanup`, { method: 'POST' });
                setTimeout(fetchStatus, 500);
            } catch (e) {
                console.error(e);
            } finally {
                setLoading('btnCleanup', 'spinCleanup', false);
            }
        }

        function setLoading(btnId, spinId, isLoading) {
            const btn = document.getElementById(btnId);
            const spin = document.getElementById(spinId);
            btn.disabled = isLoading;
            spin.style.display = isLoading ? 'inline-block' : 'none';
        }

        // Start polling every 1 second
        setInterval(fetchStatus, 1000);
        // Initial fetch
        fetchStatus();

    </script>
</body>
</html>
